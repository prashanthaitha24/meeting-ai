appId: com.meeting-ai
productName: Meeting AI
copyright: Copyright © 2024

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - package.json

extraResources:
  - from: .env
    to: .env

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  # Entitlements for microphone + screen recording access
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  hardenedRuntime: true

dmg:
  title: Meeting AI
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 200
      type: file
    - x: 410
      y: 200
      type: link
      path: /Applications
