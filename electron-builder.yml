appId: com.meeting-ai
productName: Meeting AI
copyright: Copyright © 2024

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - package.json

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  hardenedRuntime: true
  extendInfo:
    CFBundleURLTypes:
      - CFBundleURLSchemes:
          - meetingai
        CFBundleURLName: com.meeting-ai

dmg:
  title: Meeting AI
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 200
      type: file
    - x: 410
      y: 200
      type: link
      path: /Applications

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  protocols:
    - name: Meeting AI
      schemes:
        - meetingai

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: Meeting.AI-Setup-${version}-${arch}.exe
